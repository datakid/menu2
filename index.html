<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LX Menu2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
--bg-base: #050507;
--glass-bg: rgba(12, 12, 16, 0.4);
--glass-border: rgba(255, 255, 255, 0.03);
--glass-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
--item-bg: rgba(255, 255, 255, 0.03);
--item-hover: rgba(255, 255, 255, 0.07);
--item-border: rgba(255, 255, 255, 0.03);
--item-border-hover: rgba(255, 255, 255, 0.12);
--text-main: #ffffff;
--text-muted: #8a8a93;
--icon-glow: rgba(255, 255, 255, 0.25);
--orb-1: #4a00e0;
--orb-2: #ff007f;
--orb-3: #00d2ff;
--grad-1: linear-gradient(135deg, #ff416c, #ff4b2b);
--grad-2: linear-gradient(135deg, #00b4db, #0083b0);
--grad-3: linear-gradient(135deg, #8a2387, #e94057);
--ease-smooth: cubic-bezier(0.16, 1, 0.3, 1);
}

body[data-theme="light"] {
--bg-base: #f4f4f7;
--glass-bg: rgba(255, 255, 255, 0.5);
--glass-border: rgba(0, 0, 0, 0.03);
--glass-shadow: 0 40px 80px rgba(0, 0, 0, 0.05);
--item-bg: rgba(0, 0, 0, 0.02);
--item-hover: rgba(0, 0, 0, 0.05);
--item-border: rgba(0, 0, 0, 0.02);
--item-border-hover: rgba(0, 0, 0, 0.08);
--text-main: #111111;
--text-muted: #666666;
--icon-glow: rgba(0, 0, 0, 0.15);
--orb-1: #c4bbff;
--orb-2: #ffbbd6;
--orb-3: #bbf0ff;
}

* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: 'Inter', sans-serif;
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;
}

body {
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
background-color: var(--bg-base);
color: var(--text-main);
overflow: hidden;
transition: background-color 1s var(--ease-smooth);
}

.noise-overlay {
position: fixed;
inset: 0;
z-index: -1;
opacity: 0.035;
pointer-events: none;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

.ambient-canvas {
position: fixed;
inset: 0;
z-index: -2;
filter: blur(120px);
opacity: 0.8;
}

.orb {
position: absolute;
border-radius: 50%;
animation: drift 20s infinite ease-in-out alternate;
}

.orb-1 { width: 50vw; height: 50vw; background: var(--orb-1); top: -10%; left: -10%; }
.orb-2 { width: 40vw; height: 40vw; background: var(--orb-2); bottom: -10%; right: -10%; animation-delay: -5s; }
.orb-3 { width: 45vw; height: 45vw; background: var(--orb-3); top: 30%; left: 40%; animation-delay: -10s; }

@keyframes drift {
0% { transform: translate(0, 0) scale(1); }
50% { transform: translate(5%, 10%) scale(1.1); }
100% { transform: translate(-5%, -5%) scale(0.95); }
}

.theme-toggle {
position: fixed;
top: 2rem;
right: 2rem;
display: flex;
background: var(--glass-bg);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border: 1px solid var(--glass-border);
border-radius: 100px;
padding: 5px;
z-index: 10;
box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.theme-btn {
background: transparent;
border: none;
color: var(--text-muted);
padding: 8px 16px;
border-radius: 100px;
cursor: pointer;
font-size: 0.9rem;
font-weight: 500;
transition: all 0.4s var(--ease-smooth);
display: flex;
align-items: center;
gap: 6px;
}

.theme-btn.active {
background: var(--text-main);
color: var(--bg-base);
}

.theme-btn i { font-size: 0.85rem; }

.portal-container {
position: relative;
width: 100%;
max-width: 720px;
padding: 2rem;
z-index: 1;
}

.glass-box {
background: var(--glass-bg);
backdrop-filter: blur(60px) saturate(180%);
-webkit-backdrop-filter: blur(60px) saturate(180%);
border: 1px solid var(--glass-border);
border-radius: 40px;
padding: 3.5rem 3rem;
box-shadow: var(--glass-shadow);
position: relative;
overflow: hidden;
}

.glass-box::before {
content: "";
position: absolute;
inset: 0;
opacity: 0.015;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
pointer-events: none;
}

.header-section {
text-align: center;
margin-bottom: 3.5rem;
}

.eyebrow {
font-size: 0.8rem;
text-transform: uppercase;
letter-spacing: 0.3em;
color: var(--text-muted);
margin-bottom: 1rem;
font-weight: 600;
display: block;
}

.title {
font-size: 3rem;
font-weight: 300;
letter-spacing: -0.04em;
color: var(--text-main);
line-height: 1.1;
}

.title strong {
font-weight: 600;
}

.menu-grid {
display: flex;
flex-direction: column;
gap: 1.25rem;
}

.menu-item {
text-decoration: none;
display: flex;
align-items: center;
padding: 1.25rem 1.5rem;
border-radius: 24px;
background: var(--item-bg);
border: 1px solid var(--item-border);
transition: all 0.5s var(--ease-smooth);
position: relative;
}

.menu-item:hover {
background: var(--item-hover);
border-color: var(--item-border-hover);
transform: scale(1.02) translateY(-2px);
box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
}

.icon-wrapper {
width: 64px;
height: 64px;
border-radius: 18px;
display: flex;
align-items: center;
justify-content: center;
margin-right: 1.5rem;
font-size: 1.5rem;
color: #ffffff;
box-shadow: inset 0 2px 4px rgba(255,255,255,0.3), 0 10px 20px rgba(0,0,0,0.2);
position: relative;
transition: all 0.5s var(--ease-smooth);
}

.icon-wrapper::after {
content: '';
position: absolute;
inset: 0;
border-radius: inherit;
box-shadow: 0 0 0 transparent;
transition: box-shadow 0.5s var(--ease-smooth);
z-index: -1;
}

.menu-item:hover .icon-wrapper {
transform: scale(1.08) rotate(4deg);
}

.menu-item:hover .icon-wrapper::after {
box-shadow: 0 15px 30px var(--icon-glow);
}

.text-content {
flex: 1;
transition: transform 0.5s var(--ease-smooth);
}

.menu-item:hover .text-content {
transform: translateX(8px);
}

.item-title {
font-size: 1.25rem;
font-weight: 500;
color: var(--text-main);
margin-bottom: 0.25rem;
letter-spacing: -0.01em;
}

.item-desc {
font-size: 0.95rem;
color: var(--text-muted);
font-weight: 400;
}

.arrow {
color: var(--text-muted);
font-size: 1.2rem;
opacity: 0;
transform: translateX(-15px);
transition: all 0.5s var(--ease-smooth);
}

.menu-item:hover .arrow {
opacity: 1;
transform: translateX(0);
color: var(--text-main);
}

@media (max-width: 600px) {
.portal-container { padding: 1rem; }
.glass-box { padding: 2.5rem 1.5rem; border-radius: 32px; }
.title { font-size: 2.4rem; }
.theme-toggle { top: 1rem; right: 1rem; }
.theme-btn span { display: none; }
.theme-btn { padding: 10px; }
.icon-wrapper { width: 54px; height: 54px; font-size: 1.2rem; margin-right: 1rem; }
.menu-item { padding: 1rem; }
}

.gsap-init { visibility: hidden; }
</style>
</head>
<body>
<div class="ambient-canvas">
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
</div>
<div class="noise-overlay"></div>
<div class="theme-toggle gsap-init">
<button class="theme-btn" data-theme="system">
<i class="fas fa-desktop"></i><span>Auto</span>
</button>
<button class="theme-btn" data-theme="light">
<i class="fas fa-sun"></i><span>Light</span>
</button>
<button class="theme-btn active" data-theme="dark">
<i class="fas fa-moon"></i><span>Dark</span>
</button>
</div>
<div class="portal-container">
<div class="glass-box gsap-box">
<div class="header-section">
<span class="eyebrow gsap-el">Linkexpress</span>
<h1 class="title gsap-el">Portal <strong>Access</strong></h1>
</div>
<div class="menu-grid">
<a href="https://finalapp-nine.vercel.app/" class="menu-item gsap-item" target="_blank">
<div class="icon-wrapper" style="background: var(--grad-1);">
<i class="fas fa-layer-group"></i>
</div>
<div class="text-content">
<div class="item-title">Initialize Draft</div>
<div class="item-desc">Launch a new integration canvas</div>
</div>
<i class="fas fa-arrow-right arrow"></i>
</a>
<a href="https://dashboard2-iota.vercel.app/" class="menu-item gsap-item" target="_blank">
<div class="icon-wrapper" style="background: var(--grad-2);">
<i class="fas fa-compass"></i>
</div>
<div class="text-content">
<div class="item-title">Active Workspace</div>
<div class="item-desc">Resume your current projects</div>
</div>
<i class="fas fa-arrow-right arrow"></i>
</a>
<a href="#" class="menu-item gsap-item" id="exitBtn">
<div class="icon-wrapper" style="background: var(--grad-3);">
<i class="fas fa-power-off"></i>
</div>
<div class="text-content">
<div class="item-title">Terminate Session</div>
<div class="item-desc">Securely disconnect environment</div>
</div>
</a>
</div>
</div>
</div>
<script>
const themeBtns = document.querySelectorAll('.theme-btn');

function applyTheme(theme) {
const activeTheme = theme === 'system'
? (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
: theme;

document.body.setAttribute('data-theme', activeTheme);

themeBtns.forEach(btn => {
btn.classList.toggle('active', btn.dataset.theme === theme);
});
localStorage.setItem('portal-state', theme);
}

applyTheme(localStorage.getItem('portal-state') || 'dark');

themeBtns.forEach(btn => {
btn.addEventListener('click', () => applyTheme(btn.dataset.theme));
});

window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
if (localStorage.getItem('portal-state') === 'system') applyTheme('system');
});

document.addEventListener("DOMContentLoaded", () => {
gsap.set(".gsap-init", { visibility: "visible" });
gsap.set(".gsap-box", { visibility: "visible" });

const tl = gsap.timeline({ defaults: { ease: "expo.out" } });

tl.fromTo(".gsap-box",
{ y: 50, opacity: 0, scale: 0.96, filter: "blur(20px)" },
{ y: 0, opacity: 1, scale: 1, filter: "blur(0px)", duration: 1.8 }
)
.fromTo(".gsap-el",
{ y: 20, opacity: 0 },
{ y: 0, opacity: 1, duration: 1.2, stagger: 0.1 },
"-=1.4"
)
.fromTo(".gsap-item",
{ y: 20, opacity: 0, scale: 0.98 },
{ y: 0, opacity: 1, scale: 1, duration: 1.2, stagger: 0.1 },
"-=1.1"
)
.fromTo(".theme-toggle",
{ y: -20, opacity: 0 },
{ y: 0, opacity: 1, duration: 1.2 },
"-=1.2"
);

document.getElementById('exitBtn').addEventListener('click', (e) => {
e.preventDefault();

const exitTl = gsap.timeline({
onComplete: () => {
window.close();
if (window.location.href.includes('about:')) window.location.replace('about:blank');
window.location.href = 'about:blank';
}
});

exitTl.to(".gsap-item", { x: 20, opacity: 0, duration: 0.4, stagger: -0.05, ease: "power2.in" })
.to(".gsap-el", { y: -20, opacity: 0, duration: 0.4, ease: "power2.in" }, "-=0.2")
.to(".gsap-box", { scale: 0.95, opacity: 0, filter: "blur(20px)", duration: 0.6, ease: "expo.inOut" }, "-=0.2")
.to(".theme-toggle", { y: -20, opacity: 0, duration: 0.4 }, "-=0.4")
.to(".ambient-canvas", { opacity: 0, duration: 0.6 }, "-=0.4");
});
});
</script>
</body>
</html>
